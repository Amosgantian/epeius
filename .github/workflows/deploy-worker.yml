name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ 设置环境（生产/预览）
      - name: Set Deployment Environment
        id: set-env
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=preview" >> $GITHUB_OUTPUT
          fi
          
      # 3️⃣ 安装 Wrangler
      - name: Install Wrangler
        run: npm install -g wrangler

      # 4️⃣ 部署 Worker（保留 UI 变量、KV、域名）
      - name: Deploy Worker
        id: deploy-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying Worker to environment: ${{ steps.set-env.outputs.env }}"
          wrangler deploy --env ${{ steps.set-env.outputs.env }} --keep-vars || exit 1

      # 5️⃣ GitHub Summary
      - name: Add Deployment Info to GitHub Summary
        if: always()
        run: |
          echo "## ✅ Cloudflare Worker Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.set-env.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Worker:** Deployed via Wrangler" >> $GITHUB_STEP_SUMMARY

      # 6️⃣ Telegram Notification (成功)
      - name: Telegram Notification (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="✅ *Worker Deployment Successful*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}" \
          -d parse_mode="Markdown"

      # 7️⃣ Telegram Notification (失败)
      - name: Telegram Notification (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="❌ *Worker Deployment Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}" \
          -d parse_mode="Markdown"
